<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tripora | Invoice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body data-page="invoice">
  <div class="page-shell">
    <header class="main-nav glass-panel no-print">
      <a class="brand" href="dashboard.html">Tripora ✈️</a>
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="history.html">Bookings</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" type="button" data-theme-toggle>Dark Mode</button>
      </div>
    </header>

    <main class="invoice-layout">
      <section class="glass-panel invoice-card" id="invoiceCard"></section>
      <aside class="glass-panel invoice-actions no-print">
        <div class="section-head compact">
          <h3>Actions</h3>
        </div>
        <button class="btn btn-primary" id="printInvoiceBtn" type="button">Print Invoice</button>
        <button class="btn btn-secondary" id="downloadPdfBtn" type="button">Download PDF</button>
        <a class="btn btn-ghost" href="history.html">View Booking History</a>
      </aside>
    </main>
  </div>
  <div id="toast" class="toast no-print"></div>
  <script src="static/js/data.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
