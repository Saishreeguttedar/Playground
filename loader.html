<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tripora | Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body data-page="loader">
  <main class="loader-screen">
    <div class="glass-panel loader-panel">
      <div class="brand loader-brand">Tripora ✈️</div>
      <p>Preparing your travel dashboard...</p>
      <div class="progress-track">
        <div class="progress-bar" id="loaderBar"></div>
      </div>
      <div class="progress-meta">
        <span id="loaderPercent">0%</span>
        <span>Almost ready</span>
      </div>
    </div>
  </main>
  <script src="static/js/data.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
