<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tripora | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body data-page="login">
  <main class="auth-layout">
    <section class="auth-showcase">
      <div class="glass-panel auth-blurb">
        <p class="eyebrow">Welcome back</p>
        <h1>Continue your next great getaway.</h1>
        <p>Flights, stays, buses, trains, quick planning, and booking history all in one place.</p>
      </div>
    </section>
    <section class="auth-panel-wrap">
      <div class="glass-panel auth-panel">
        <div class="brand">Tripora ✈️</div>
        <h2>Login</h2>
        <form id="loginForm" class="stack-form">
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="traveler@example.com" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" placeholder="Enter password" required>
          </label>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>
        <p class="form-alt">New to Tripora? <a href="signup.html">Create an account</a></p>
        <div class="demo-box">
          <strong>Quick demo account</strong>
          <p>Email: demo@tripora.com</p>
          <p>Password: demo1234</p>
        </div>
      </div>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="static/js/data.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
