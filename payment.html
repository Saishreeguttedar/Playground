<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tripora | Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body data-page="payment">
  <div class="page-shell">
    <header class="main-nav glass-panel">
      <a class="brand" href="dashboard.html">Tripora ✈️</a>
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="history.html">Bookings</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" type="button" data-theme-toggle>Dark Mode</button>
      </div>
    </header>

    <main class="two-col-layout">
      <section class="glass-panel booking-summary" id="paymentSummary"></section>
      <section class="glass-panel payment-panel">
        <div class="section-head">
          <h2>Payment Simulation</h2>
          <p>Select your preferred method and complete the booking.</p>
        </div>
        <form id="paymentForm" class="stack-form">
          <div class="payment-methods">
            <label class="method-option">
              <input type="radio" name="method" value="Card" checked>
              <span>Card</span>
            </label>
            <label class="method-option">
              <input type="radio" name="method" value="UPI">
              <span>UPI</span>
            </label>
            <label class="method-option">
              <input type="radio" name="method" value="Net Banking">
              <span>Net Banking</span>
            </label>
          </div>
          <label>
            <span>Reference</span>
            <input type="text" name="reference" placeholder="4111 1111 1111 1111 / your@upi" required>
          </label>
          <button class="btn btn-primary" type="submit">Pay Securely</button>
        </form>
        <div id="paymentSuccess" class="success-box hidden">
          <h3>Payment Successful</h3>
          <p>Your booking is confirmed. Redirecting to invoice...</p>
        </div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script src="static/js/data.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
