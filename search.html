<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tripora | Search Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body data-page="search">
  <div class="page-shell">
    <header class="main-nav glass-panel">
      <a class="brand" href="dashboard.html">Tripora ✈️</a>
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="history.html">Bookings</a>
      </nav>
      <div class="nav-actions">
        <button class="theme-toggle" type="button" data-theme-toggle>Dark Mode</button>
      </div>
    </header>

    <section class="content-section search-header glass-panel">
      <div>
        <p class="eyebrow">Trip Results</p>
        <h1 id="searchHeading">Matching journeys</h1>
        <p id="searchSubheading">Find the route that feels right, then book in minutes.</p>
      </div>
      <div class="filter-bar">
        <label>
          <span>Max Price</span>
          <input type="range" id="priceFilter" min="5000" max="80000" step="1000" value="80000">
          <strong id="priceFilterValue">₹80,000</strong>
        </label>
        <label>
          <span>Min Rating</span>
          <select id="ratingFilter">
            <option value="0">Any</option>
            <option value="4">4+</option>
            <option value="4.5">4.5+</option>
          </select>
        </label>
      </div>
    </section>

    <section class="content-section">
      <div id="searchResults" class="search-results"></div>
    </section>
  </div>
  <div id="toast" class="toast"></div>
  <script src="static/js/data.js"></script>
  <script src="static/js/app.js"></script>
</body>
</html>
