{% extends "main/base.html" %}

{% block title %}Tripora | Loading{% endblock %}
{% block page_name %}loader{% endblock %}

{% block content %}
<main class="loader-page">
    <section class="loader-card glass-panel">
        <div class="plane-loader">✈️</div>
        <h2>Preparing your next adventure</h2>
        <p>Connecting routes, offers, and stays for the smoothest start.</p>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text"><span id="progressCount">0</span>%</p>
        <a href="{% url 'login' %}" class="ghost-button loader-fallback">Skip</a>
    </section>
</main>
{% endblock %}
